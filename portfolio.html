  <!-- Shared embed dialog -->
  <dialog id="embedDialog" class="embed-dialog">
    <button class="embed-close dialog-close">✕</button>
    <div class="embed-meta">
      <h2 class="embed-title"></h2>
      <p class="embed-desc"></p>
    </div>
    <!-- single video -->
    <div class="embed-wrapper" id="singleWrapper" style="display:none">
      <iframe id="pf-embedFrame" src="" frameborder="0" allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
    <!-- multi-video grid -->
    <div class="video-grid" id="multiGrid" style="display:none"></div>
    <!-- spotify -->
    <div id="spotifyWrapper" style="display:none">
      <iframe id="spotifyFrame" style="border-radius:8px" src="" width="100%" height="352"
        frameBorder="0" allowfullscreen
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>
    <!-- custom audio player -->
    <div class="audio-player" id="audioPlayer" style="display:none"></div>
  </dialog>

  <script src="script.js"></script>
  <script>
  (function() {
    const btn = document.getElementById('langGlobeBtn');
    const dropdown = document.getElementById('langDropdown');
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });
    document.addEventListener('click', function() {
      dropdown.classList.remove('open');
    });
  })();
  </script>
  <script>
  (function() {
    const dialog      = document.getElementById('embedDialog');
    const closeBtn    = document.querySelector('.embed-close');
    const titleEl     = dialog.querySelector('.embed-title');
    const descEl      = dialog.querySelector('.embed-desc');
    const singleWrap  = document.getElementById('singleWrapper');
    const embedFrame  = document.getElementById('pf-embedFrame');
    const multiGrid   = document.getElementById('multiGrid');
    const spotifyWrap = document.getElementById('spotifyWrapper');
    const spotifyFrm  = document.getElementById('spotifyFrame');
    const audioPlayer = document.getElementById('audioPlayer');

    let currentAudio = null;

    function hideAll() {
      // Clear meta so it never bleeds outside the dialog
      titleEl.textContent = '';
      descEl.textContent  = '';
      singleWrap.style.display  = 'none';
      multiGrid.style.display   = 'none';
      spotifyWrap.style.display = 'none';
      audioPlayer.style.display = 'none';
      embedFrame.src  = '';
      spotifyFrm.src  = '';
      multiGrid.innerHTML    = '';
      audioPlayer.innerHTML  = '';
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    }

    // Start clean
    hideAll();

    document.querySelectorAll('.project-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        hideAll();
        titleEl.textContent = btn.dataset.title || '';
        descEl.textContent  = btn.dataset.desc  || '';
        const type = btn.dataset.type;

        if (type === 'vimeo') {
          singleWrap.style.display = 'block';
          // remove is-soundcloud class
          singleWrap.classList.remove('is-soundcloud');
          embedFrame.src = btn.dataset.url;

        } else if (type === 'multi-vimeo') {
          multiGrid.style.display = 'flex';
          const videos = JSON.parse(btn.dataset.videos);
          videos.forEach(v => {
            const item = document.createElement('div');
            const label = document.createElement('div');
            label.className = 'video-item-label';
            label.textContent = v.label;
            const wrap = document.createElement('div');
            wrap.className = 'embed-wrapper';
            const fr = document.createElement('iframe');
            fr.src = v.url;
            fr.frameBorder = '0';
            fr.allowFullscreen = true;
            fr.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
            fr.loading = 'lazy';
            wrap.appendChild(fr);
            item.appendChild(label);
            item.appendChild(wrap);
            multiGrid.appendChild(item);
          });

        } else if (type === 'spotify') {
          spotifyWrap.style.display = 'block';
          spotifyFrm.src = btn.dataset.url;

        } else if (type === 'audio') {
          audioPlayer.style.display = 'flex';
          const tracks = JSON.parse(btn.dataset.tracks);
          tracks.forEach((track, idx) => {
            const row = document.createElement('div');
            row.className = 'audio-track';

            const playBtnEl = document.createElement('button');
            playBtnEl.className = 'audio-play-btn';
            playBtnEl.textContent = '▶';

            const info = document.createElement('div');
            info.className = 'audio-track-info';
            const name = document.createElement('div');
            name.className = 'audio-track-name';
            name.textContent = track.name;
            const dur = document.createElement('div');
            dur.className = 'audio-track-duration';
            dur.textContent = '--:--';
            info.appendChild(name);
            info.appendChild(dur);

            const progWrap = document.createElement('div');
            progWrap.className = 'audio-progress-wrap';
            const progBar = document.createElement('div');
            progBar.className = 'audio-progress-bar';
            progWrap.appendChild(progBar);

            const audio = new Audio(track.src);
            audio.preload = 'metadata';

            audio.addEventListener('loadedmetadata', () => {
              const m = Math.floor(audio.duration / 60);
              const s = Math.floor(audio.duration % 60).toString().padStart(2,'0');
              dur.textContent = `${m}:${s}`;
            });
            audio.addEventListener('timeupdate', () => {
              if (audio.duration) {
                progBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                const m = Math.floor(audio.currentTime / 60);
                const s = Math.floor(audio.currentTime % 60).toString().padStart(2,'0');
                dur.textContent = `${m}:${s}`;
              }
            });
            audio.addEventListener('ended', () => {
              playBtnEl.textContent = '▶';
              playBtnEl.classList.remove('playing');
              progBar.style.width = '0%';
            });

            playBtnEl.addEventListener('click', () => {
              if (currentAudio && currentAudio !== audio) {
                currentAudio.pause();
                // reset other buttons
                audioPlayer.querySelectorAll('.audio-play-btn').forEach(b => {
                  b.textContent = '▶'; b.classList.remove('playing');
                });
                audioPlayer.querySelectorAll('.audio-progress-bar').forEach(b => {
                  b.style.width = '0%';
                });
              }
              if (audio.paused) {
                audio.play();
                playBtnEl.textContent = '■';
                playBtnEl.classList.add('playing');
                currentAudio = audio;
              } else {
                audio.pause();
                playBtnEl.textContent = '▶';
                playBtnEl.classList.remove('playing');
              }
            });

            progWrap.addEventListener('click', e => {
              const rect = progWrap.getBoundingClientRect();
              const frac = (e.clientX - rect.left) / rect.width;
              audio.currentTime = frac * audio.duration;
            });

            row.appendChild(playBtnEl);
            row.appendChild(info);
            row.appendChild(progWrap);
            audioPlayer.appendChild(row);
          });
        }

        dialog.showModal();
      });
    });

    // Close
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      hideAll();
      dialog.close();
    });
    dialog.addEventListener('click', e => {
      const rect = dialog.getBoundingClientRect();
      if (e.clientX < rect.left || e.clientX > rect.right ||
          e.clientY < rect.top  || e.clientY > rect.bottom) {
        hideAll();
        dialog.close();
      }
    });
  })();
  </script>
</body>

</html>
