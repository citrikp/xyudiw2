<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mari Herzer · writings on sound</title>
  <link rel="stylesheet" href="styles.css?v=202603191944">
  <link rel="icon" href="resources/img/favicon1.ico" type="image/x-icon">

  <style>
    /* ── unlock scroll ── */
    html, body             { overflow-y: auto !important; overflow-x: hidden; height: auto !important; }
    html, body, .container { overflow-y: auto !important; }

    /* .container is position:fixed in styles.css — undo that here */
    .substack-page.container {
      position: relative !important;
      height: auto !important;
      min-height: 10vh;
      overflow: visible !important;
      max-width: 100vh;
      padding: 1vh 8vw 10vh;
      gap: 0;
    }

    #player-ui        { display: none !important; }
    .lang-switcher    { display: none !important; }

    /* ── back link — matches portfolio style ── */
    .back-link {
      display: inline-block;
      margin-bottom: 2.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--ink);
      opacity: 0.7;
      text-decoration: none;
      transition: opacity 0.2s;
      font-family: var(--mono);
    }
    .back-link:hover { opacity: 1; }

    /* ── page title — matches portfolio h1 scale ── */
    .substack-header {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid rgba(15,15,14,0.15);
      padding-bottom: 1.2rem;
      font-family: 'DM Serif Display', serif;
    }
    .substack-header h2 {
      font-size: clamp(2.2rem, 9vw, 3.5rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.05;
      margin: 0;
      text-transform: lowercase;
      font-family: inherit;
      font-family: 'DM Serif Display', serif;
    }

    /* ── posts ── */
    .rss-post {
      margin-bottom: 3.5rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid rgba(15,15,14,0.1);
    }
    .rss-post:last-child { border-bottom: none; }

    .rss-post-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .rss-post-title {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 400;
      letter-spacing: 0.03em;
      line-height: 1.2;
      font-style: italic;
      font-family: 'DM Serif Display', serif;
    }
    .rss-post-date {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      opacity: 0.4;
      white-space: nowrap;
      font-family: var(--mono);
    }

    .rss-post-body {
      font-size: 0.92rem;
      line-height: 1.8;
      opacity: 0.82;
      text-align: justify;
    }
    .rss-post-body p { margin-bottom: 1em; }
    .rss-post-body img { max-width: 100%; height: auto; margin: 1rem 0; }
    .rss-post-body h1,
    .rss-post-body h2,
    .rss-post-body h3 { font-weight: 400; font-style: italic; margin: 1.4em 0 0.6em; text-align: left; }

    /* ── "read on substack" link — same family/size as portfolio nav ── */
    .rss-post-link {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      opacity: 0.4;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
      font-family: var(--mono);
    }
    .rss-post-link:hover { opacity: 1; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <canvas id="creature-canvas"></canvas>
  <canvas id="world-canvas"></canvas>
  <div class="noise"></div>
  <div id="cinema-veil"></div>

  <div class="lang-switcher" id="langSwitcher"></div>

  <main class="substack-page container">

    <a href="index.html" class="back-link">← back</a>

    <div class="substack-header">
      <h2>writings on sound</h2>
    </div>

    <div id="rss-feed">
      <p style="opacity:0.4; font-size:0.8rem; letter-spacing:0.1em;">loading...</p>
    </div>

    <script>
    fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('https://writingsonsound1.substack.com/feed'))
      .then(r => r.json())
      .then(data => {
        const feed = document.getElementById('rss-feed');
        feed.innerHTML = '';
        (data.items || []).forEach(item => {
          const date    = new Date(item.pubDate);
          const dateStr = date.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
          const article = document.createElement('article');
          article.className = 'rss-post';
          article.innerHTML = `
            <div class="rss-post-header">
              <h3 class="rss-post-title">${item.title}</h3>
              <span class="rss-post-date">${dateStr}</span>
            </div>
            <div class="rss-post-body">${item.content || item.description}</div>
            <a class="rss-post-link" href="${item.link}" target="_blank">read on substack ↗</a>
          `;
          feed.appendChild(article);
        });
      })
      .catch(() => {
        document.getElementById('rss-feed').innerHTML =
          '<p style="opacity:0.4;font-size:0.8rem;">could not load posts.</p>';
      });
    </script>

  </main>

  <div id="player-ui"></div>

  <script src="script.js"></script>
</body>
</html>
