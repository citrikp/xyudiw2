  <style>
    .substack-page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 2.5rem 2rem 6rem 2rem;
      max-width: 680px;
    }

    .substack-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--color-text, #e8e0d0);
      opacity: 0.55;
      text-decoration: none;
      margin-bottom: 2.8rem;
      transition: opacity 0.2s;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .substack-back:hover { opacity: 1; }
    .substack-back::before { content: '←'; font-size: 1em; }

    .substack-header {
      margin-bottom: 2.2rem;
    }
    .substack-header h2 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      margin: 0 0 0.5rem 0;
      line-height: 1.1;
      color: var(--color-text, #e8e0d0);
    }
    .substack-header p {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      opacity: 0.45;
      margin: 0;
      text-transform: lowercase;
    }

    .substack-divider {
      width: 2.5rem;
      height: 1px;
      background: currentColor;
      opacity: 0.25;
      margin-bottom: 2rem;
    }

    .substack-feed-wrapper {
      width: 100%;
      max-width: 560px;
    }

    #substack-feed-embed {
      --color-bg: transparent !important;
      background: transparent !important;
    }

    .substack-subscribe {
      margin-top: 2.8rem;
      padding-top: 1.8rem;
      border-top: 1px solid rgba(232, 224, 208, 0.12);
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .substack-subscribe p {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      opacity: 0.4;
      margin: 0;
      text-transform: lowercase;
    }
    .substack-subscribe a {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: var(--color-text, #e8e0d0);
      opacity: 0.7;
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 224, 208, 0.3);
      padding-bottom: 0.1em;
      transition: opacity 0.2s;
    }
    .substack-subscribe a:hover { opacity: 1; }
    .substack-subscribe a::after { content: '↗'; font-size: 0.85em; }
  </style>
</head>
