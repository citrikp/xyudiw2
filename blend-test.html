<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; }

  .video-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
  }

  video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  h1 {
    position: fixed;
    top: 2rem;
    left: 2rem;
    z-index: 1;
    font-size: 8vw;
    color: #fff;
    mix-blend-mode: difference;
    font-family: serif;
  }
</style>
</head>
<body>
  <div class="video-wrap">
    <video src="resources/img/bgweb/bg-website.mp4" autoplay muted loop playsinline></video>
  </div>
  <h1>Mari Herzer</h1>
</body>
</html>
