  <!-- FULLSCREEN VIDEO OVERLAY -->

    <button id="fullscreen-close" style="position:absolute;top:1.2rem;right:1.5rem;background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;z-index:10;opacity:0.7;">&#x2715;</button>

  <!-- Shared embed dialog -->

    <button class="embed-close dialog-close">✕</button>

      <p class="embed-desc"></p>
    </div>
    <!-- single video -->
    <div class="embed-wrapper" id="singleWrapper" style="display:none">

        allow="autoplay; fullscreen; picture-in-picture"></iframe>

    </div>
    <!-- bandcamp -->

        src="" seamless><a href="#">Loading...</a></iframe>
    </div>
    <!-- custom audio player -->
    <div class="audio-player" id="audioPlayer" style="display:none"></div>

  <script>
  (function() {
    const btn = document.getElementById('langGlobeBtn');
    const dropdown = document.getElementById('langDropdown');
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });
    document.addEventListener('click', function() {
      dropdown.classList.remove('open');
    });
  })();
  </script>
  <script>
  (function() {
    const dialog      = document.getElementById('embedDialog');
    const closeBtn    = document.querySelector('.embed-close');
    const titleEl     = dialog.querySelector('.embed-title');
    const descEl      = dialog.querySelector('.embed-desc');
    const singleWrap  = document.getElementById('singleWrapper');
    const embedFrame  = document.getElementById('pf-embedFrame');
    const multiGrid   = document.getElementById('multiGrid');
    const spotifyWrap = document.getElementById('spotifyWrapper');
    const spotifyFrm  = document.getElementById('spotifyFrame');
    const audioPlayer = document.getElementById('audioPlayer');

    let currentAudio = null;

    function hideAll() {
      // Clear meta so it never bleeds outside the dialog
      titleEl.textContent = '';
      descEl.textContent  = '';
      singleWrap.style.display  = 'none';
      multiGrid.style.display   = 'none';
      spotifyWrap.style.display = 'none';
      audioPlayer.style.display = 'none';
      embedFrame.src  = '';
      spotifyFrm.src  = '';
      multiGrid.innerHTML    = '';
      audioPlayer.innerHTML  = '';
      const bandcampWrap = document.getElementById('bandcampWrapper');
      const bandcampFrm  = document.getElementById('bandcampFrame');
      if (bandcampWrap) { bandcampWrap.style.display = 'none'; }
      if (bandcampFrm)  { bandcampFrm.src = ''; }
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    }

    // Start clean
    hideAll();

    document.querySelectorAll('.project-btn:not([data-type="fullscreen-video"]):not([data-type="bandcamp-multi"])').forEach(btn => {
      btn.addEventListener('click', () => {
        hideAll();
        titleEl.textContent = btn.dataset.title || '';
        descEl.textContent  = btn.dataset.desc  || '';
        const type = btn.dataset.type;

        if (type === 'vimeo') {
          singleWrap.style.display = 'block';
          // remove is-soundcloud class
          singleWrap.classList.remove('is-soundcloud');
          embedFrame.src = btn.dataset.url;

        } else if (type === 'multi-vimeo') {
          multiGrid.style.display = 'flex';
          const videos = JSON.parse(btn.dataset.videos);
          videos.forEach(v => {
            const item = document.createElement('div');
            const label = document.createElement('div');
            label.className = 'video-item-label';
            label.textContent = v.label;
            const wrap = document.createElement('div');
            wrap.className = 'embed-wrapper';
            const fr = document.createElement('iframe');
            fr.src = v.url;
            fr.frameBorder = '0';
            fr.allowFullscreen = true;
            fr.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
            fr.loading = 'lazy';
            wrap.appendChild(fr);
            item.appendChild(label);
            item.appendChild(wrap);
            multiGrid.appendChild(item);
          });
         if (btn.dataset.images) {
            const images = JSON.parse(btn.dataset.images);
            images.forEach((src, i) => {
              const imgWrap = document.createElement('div');
              imgWrap.className = 'dialog-image-wrap';
              const img = document.createElement('img');
              img.src = src;
              img.alt = btn.dataset.title || '';
              img.className = 'dialog-poster' + (i === 1 ? ' dialog-poster--large' : '');
              imgWrap.appendChild(img);
              multiGrid.appendChild(imgWrap);
            });
          }

        } else if (type === 'spotify') {
          spotifyWrap.style.display = 'block';
          spotifyFrm.src = btn.dataset.url;

        } else if (type === 'bandcamp') {
          const bcWrap = document.getElementById('bandcampWrapper');
          const bcFrm  = document.getElementById('bandcampFrame');
          bcWrap.style.display = 'block';
          bcFrm.src = btn.dataset.bandcampUrl || '';

        } else if (type === 'audio') {
          audioPlayer.style.display = 'flex';
          const tracks = JSON.parse(btn.dataset.tracks);
          tracks.forEach((track, idx) => {
            const row = document.createElement('div');
            row.className = 'audio-track';

            const playBtnEl = document.createElement('button');
            playBtnEl.className = 'audio-play-btn';
            playBtnEl.textContent = '▶';

            const info = document.createElement('div');
            info.className = 'audio-track-info';
            const name = document.createElement('div');
            name.className = 'audio-track-name';
            name.textContent = track.name;
            const dur = document.createElement('div');
            dur.className = 'audio-track-duration';
            dur.textContent = '--:--';
            info.appendChild(name);
            info.appendChild(dur);

            const progWrap = document.createElement('div');
            progWrap.className = 'audio-progress-wrap';
            const progBar = document.createElement('div');
            progBar.className = 'audio-progress-bar';
            progWrap.appendChild(progBar);

            const audio = new Audio(track.src);
            audio.preload = 'metadata';

            audio.addEventListener('loadedmetadata', () => {
              const m = Math.floor(audio.duration / 60);
              const s = Math.floor(audio.duration % 60).toString().padStart(2,'0');
              dur.textContent = `${m}:${s}`;
            });
            audio.addEventListener('timeupdate', () => {
              if (audio.duration) {
                progBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                const m = Math.floor(audio.currentTime / 60);
                const s = Math.floor(audio.currentTime % 60).toString().padStart(2,'0');
                dur.textContent = `${m}:${s}`;
              }
            });
            audio.addEventListener('ended', () => {
              playBtnEl.textContent = '▶';
              playBtnEl.classList.remove('playing');
              progBar.style.width = '0%';
            });

            playBtnEl.addEventListener('click', () => {
              if (currentAudio && currentAudio !== audio) {
                currentAudio.pause();
                // reset other buttons
                audioPlayer.querySelectorAll('.audio-play-btn').forEach(b => {
                  b.textContent = '▶'; b.classList.remove('playing');
                });
                audioPlayer.querySelectorAll('.audio-progress-bar').forEach(b => {
                  b.style.width = '0%';
                });
              }
              if (audio.paused) {
                audio.play();
                playBtnEl.textContent = '■';
                playBtnEl.classList.add('playing');
                currentAudio = audio;
              } else {
                audio.pause();
                playBtnEl.textContent = '▶';
                playBtnEl.classList.remove('playing');
              }
            });

            progWrap.addEventListener('click', e => {
              const rect = progWrap.getBoundingClientRect();
              const frac = (e.clientX - rect.left) / rect.width;
              audio.currentTime = frac * audio.duration;
            });

            row.appendChild(playBtnEl);
            row.appendChild(info);
            row.appendChild(progWrap);
            audioPlayer.appendChild(row);
          });
        }

        dialog.showModal();
      });
    });

    // Close
    function closeDialog() {
      hideAll();
      // Stop all bandcamp iframes
      document.querySelectorAll('#bandcampWrapper iframe').forEach(function(fr) {
        fr.src = fr.src; // reload = stop
      });
      dialog.close();
    }
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      closeDialog();
    });
    dialog.addEventListener('click', e => {
      const rect = dialog.getBoundingClientRect();
      if (e.clientX < rect.left || e.clientX > rect.right ||
          e.clientY < rect.top  || e.clientY > rect.bottom) {
        closeDialog();
      }
    });
  })();
  </script>
  <script>
  (function() {
    // ── FULLSCREEN VIDEO ──
    var fsOverlay = document.getElementById('fullscreen-overlay');
    var fsFrame   = document.getElementById('fullscreen-frame');
    var fsClose   = document.getElementById('fullscreen-close');

    document.querySelectorAll('.project-btn[data-type="fullscreen-video"]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        fsFrame.src = btn.dataset.url || '';
        fsOverlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
      });
    });

    function closeFs() {
      fsOverlay.style.display = 'none';
      fsFrame.src = '';
      document.body.style.overflow = '';
    }
    fsClose.addEventListener('click', closeFs);
    // ESC fecha mesmo com iframe em foco (iframe rouba foco do document)
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && fsOverlay.style.display === 'block') closeFs();
    });
    // Quando iframe recebe foco, monitora via blur para recuperar ESC
    fsFrame.addEventListener('load', function() {
      try {
        fsFrame.contentWindow.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') closeFs();
        });
      } catch(err) {} // cross-origin: silently ignore
    });

    // ── BANDCAMP MULTI ──
    var bcDialog  = document.getElementById('embedDialog');
    var bcTitle   = bcDialog.querySelector('.embed-title');
    var bcDesc    = bcDialog.querySelector('.embed-desc');
    var bcWrapper = document.getElementById('bandcampWrapper');
    var bcCloseBtn = bcDialog.querySelector('.embed-close');

    // Stop all bandcamp iframes
    function stopAllBc() {
      bcWrapper.querySelectorAll('iframe').forEach(function(fr) {
        var s = fr.src; fr.src = ''; fr.src = s;
      });
    }

    document.querySelectorAll('.project-btn[data-type="bandcamp-multi"]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        // Hide all other wrappers in the shared dialog
        ['singleWrapper','multiGrid','spotifyWrapper','audioPlayer'].forEach(function(id) {
          document.getElementById(id).style.display = 'none';
        });
        var legacyBcFrame = document.getElementById('bandcampFrame');
        if (legacyBcFrame) legacyBcFrame.src = '';

        bcTitle.textContent = btn.dataset.title || '';
        bcDesc.textContent  = btn.dataset.desc  || '';

        // Always rebuild iframes fresh (stops previous playback cleanly)
        bcWrapper.innerHTML = '';
        bcWrapper.style.display = 'flex';
        bcWrapper.style.flexDirection = 'column';
        bcWrapper.style.gap = '8px';
        bcWrapper.style.width = '100%';

        var tracks = JSON.parse(btn.dataset.tracks);
        tracks.forEach(function(t) {
          var label = document.createElement('div');
          label.textContent = t.label;
          label.style.cssText = 'font-size:0.68rem;letter-spacing:0.1em;opacity:0.5;margin-bottom:2px;font-family:var(--mono)';

          // Wrapper relativo para o overlay
          var wrap = document.createElement('div');
          wrap.style.cssText = 'position:relative;width:100%;height:42px;';

          var fr = document.createElement('iframe');
          fr.src = t.url;
          fr.style.cssText = 'border:0;width:100%;height:42px;position:absolute;top:0;left:0;';
          fr.setAttribute('seamless', '');

          // Overlay transparente que intercepta o primeiro clique
          var overlay = document.createElement('div');
          overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;cursor:pointer;';
          overlay.title = t.label;

          overlay.addEventListener('click', function() {
            // Parar todos os outros iframes recarregando-os
            bcWrapper.querySelectorAll('iframe').forEach(function(other) {
              if (other !== fr) {
                var s = other.src;
                other.src = '';
                setTimeout(function() { other.src = s; }, 50);
              }
            });
            // Remover overlay para que o próximo clique chegue ao iframe
            overlay.remove();
          });

          wrap.appendChild(fr);
          wrap.appendChild(overlay);
          bcWrapper.appendChild(label);
          bcWrapper.appendChild(wrap);
        });

        bcDialog.showModal();
      });
    });

    // Stop bandcamp on dialog close (both button and backdrop click)
    bcCloseBtn.addEventListener('click', function() {
      stopAllBc();
    });
    bcDialog.addEventListener('close', function() {
      stopAllBc();
    });
  })();
  </script>
